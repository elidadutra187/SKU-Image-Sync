services:
  - type: web
    name: sku-image-sync
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NUVEMSHOP_STORE_ID
        sync: false
      - key: NUVEMSHOP_ACCESS_TOKEN
        sync: false
      - key: NUVEMSHOP_USER_AGENT
        value: SKU Image Sync (seu-email@exemplo.com)
      - key: IMAGES_ROOT
        value: ./Fotos
      - key: NUVEMSHOP_API_VERSION
        value: 2025-03
      - key: PORT
        value: 10000
